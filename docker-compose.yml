services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DAISO_HOST: 0.0.0.0
      DAISO_PORT: 8000
      DAISO_RELOAD: "false"
      DAISO_QUERY_PARSER_BACKEND: ${DAISO_QUERY_PARSER_BACKEND:-auto}
      DAISO_LOCAL_QUERY_MODEL_DIR: ${DAISO_LOCAL_QUERY_MODEL_DIR:-/app/models/query_parser}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DAISO_CHATBOT_MODEL: ${DAISO_CHATBOT_MODEL:-gpt-4o-mini}
    volumes:
      - ./models:/app/models
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - app
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Seoul}
      SUBDOMAINS: ${DUCKDNS_SUBDOMAINS}
      TOKEN: ${DUCKDNS_TOKEN}
      UPDATE_IP: ${DUCKDNS_UPDATE_IP:-ipv4}
      LOG_FILE: ${DUCKDNS_LOG_FILE:-true}
    volumes:
      - ./deploy/duckdns:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
